name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v22.8.1

      - name: Verify Stellar CLI version
        run: stellar --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Stellar CLI parser fixtures
        run: >-
          pnpm --filter @caatinga/core exec vitest run
          src/stellar-cli/parse-stellar-cli-version.fixtures.test.ts
          src/stellar-cli/parse-contract-id.test.ts
