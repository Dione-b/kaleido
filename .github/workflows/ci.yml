name: CI

on:
  push:
    branches:
      - master
      - main
      - developer
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Snapshot pack and packed manifest scan
        run: pnpm ci:snapshot-pack

      - name: Publish dry-run
        run: pnpm publish:dry-run

      - name: Consumer isolation (reuse packed tarballs)
        env:
          SKIP_PACK: "1"
          PACKED_DIR: ${{ github.workspace }}/packed
        run: pnpm test:consumer

      - name: Client bundler consumers
        env:
          PACKED_DIR: ${{ github.workspace }}/packed
        run: pnpm test:consumer:client-bundlers
