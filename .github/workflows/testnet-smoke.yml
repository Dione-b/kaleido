name: Testnet Smoke

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore Stellar CLI config
        env:
          CAATINGA_CI_STELLAR_CONFIG_B64: ${{ secrets.CAATINGA_CI_STELLAR_CONFIG_B64 }}
        run: |
          test -n "$CAATINGA_CI_STELLAR_CONFIG_B64"
          mkdir -p "$HOME/.config/stellar"
          echo "$CAATINGA_CI_STELLAR_CONFIG_B64" | base64 --decode > "$HOME/.config/stellar/config.toml"
          chmod 600 "$HOME/.config/stellar/config.toml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Smoke attempt 1
        id: smoke1
        continue-on-error: true
        env:
          CAATINGA_CI_IDENTITY_ALIAS: ${{ secrets.CAATINGA_CI_IDENTITY_ALIAS }}
        run: bash scripts/testnet-smoke.sh smoke-app

      - name: Smoke retry
        id: smokeretry
        if: steps.smoke1.outcome == 'failure' && steps.smoke1.outputs.transient == 'true'
        env:
          CAATINGA_CI_IDENTITY_ALIAS: ${{ secrets.CAATINGA_CI_IDENTITY_ALIAS }}
        run: bash scripts/testnet-smoke.sh smoke-app-retry

      - name: Smoke gate
        if: always()
        run: |
          s1="${{ steps.smoke1.outcome }}"
          tr="${{ steps.smoke1.outputs.transient }}"
          sr="${{ steps.smokeretry.outcome }}"
          if [[ "$s1" == "success" ]]; then
            exit 0
          fi
          if [[ "$s1" == "failure" && "$tr" == "true" && "$sr" == "success" ]]; then
            exit 0
          fi
          exit 1

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testnet-smoke-artifacts
          path: |
            smoke-ci-out/
            smoke-app/caatinga.artifacts.json
            smoke-app-retry/caatinga.artifacts.json
          if-no-files-found: ignore

      - name: Remove Stellar CLI config
        if: always()
        run: rm -f "$HOME/.config/stellar/config.toml"
