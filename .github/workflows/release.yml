name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Dist tag: alpha, beta, next, or latest"
        required: true
        default: "next"
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Snapshot pack
        run: pnpm ci:snapshot-pack

      - name: Publish dry run
        run: pnpm publish:dry-run

      - name: Consumer isolation
        run: pnpm test:consumer

      - name: Client bundler consumers
        run: pnpm test:consumer:client-bundlers
